<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  <title>Workout Selector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="chooser">
    <h2>Select Your Workout</h2>
    <label for="WorkoutSelection">Workout:</label>
    <select id="WorkoutSelection">
      <option value="">-- Select Workout --</option>
      <option value="push1">Push 1</option>
      <option value="pull1">Pull 1</option>
      <option value="legs1">Legs 1</option>
      <option value="push2">Push 2</option>
      <option value="pull2">Pull 2</option>
      <option value="legs2">Legs 2</option>
    </select>
  </div>

  <div id="dataButtonWrapper">
    <button id="dataButton" class="btn btn-data">
      <i class="fas fa-database"></i> Data
    </button>
    <select id="exerciseSelect">
      <option value="1">Squat</option>
      <option value="2">Bench Press</option>
      <option value="3">Deadlift</option>
      <!-- Fill dynamically or hardcode -->
    </select>
  </div>

  <table id="latestWorkoutsTable">
  <thead>
    <tr>
      <th>Date</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>


  <div id="workouts" style="display:none">
    <button id="back" class="btn btn-back"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="workoutContainer" class="workout-section" style="display: none;"></div>

    
      

        
    <div id="submitButton">
      <button id="submitWorkout" type="submit">Finish Workout</button>
    </div>
  </div>

  <div id="dataSection" style="display:none">
    <button id="dataBack" class="btn btn-back"><i class="fas fa-arrow-left"></i> Back</button>
    <h2>All Exercises</h2>
    <select id="exerciseDropdown">
      <option value="">--Select Exercise--</option>
      <!-- Options will be added dynamically from JS -->
    </select>
  </div>

  <dialog id="exerciseDialog">
  <form method="dialog" id="exerciseForm">
    <label>
      Choose or type an exercise:
      <input list="exerciseList" id="exerciseInput" placeholder="e.g. Squat" />
      <datalist id="exerciseList">
        <!-- options will be injected by JS -->
      </datalist>
    </label>
    <menu>
      <button value="cancel">Cancel</button>
      <button id="exerciseConfirm" value="default">Add</button>
    </menu>
  </form>
</dialog>

<dialog id="infoDialog">
  <p id="infoText"></p>
  <button type="button" id="infoCloseButton">Close</button>
</dialog>

  <script>
const workoutsData = {
  push1: [
    "Bench Press",
    "Machine Shoulder Press",
    "Dips",
    "Eccentric Skull Crushers",
    "Egyptian Lateral Raise",
    "Cable Tricep Kickback"
  ],
  pull1: [
    "Weighted Pull-Up",
    "Seated Cable Row",
    "Cable Pullover",
    "Hammer Curl",
    "Incline Dumbbell Curl"
  ],
  legs1: [
    "Squat",
    "Romanian Deadlift",
    "Single Leg Press",
    "Leg Extension",
    "Seated Leg Curls",
    "Standing Calf Raise"
  ],
  push2: [
    "Overhead Press",
    "Close-Grip Bench Press",
    "Cable Crossover",
    "Overhead Tricep Ext",
    "Lateral Raise 21's",
    "Neck Flexion/Extension"
  ],
  pull2: [
    "Omni-Grip Lat Pulldown",
    "Chest-Supported Row",
    "Rope Facepull",
    "Incline Dumbbell Shrug (Optional)",
    "Reverse Pec Deck",
    "Pronated Curl",
    "Supinated Curl"
  ],
  legs2: [
    "Deadlift",
    "Hack Squat",
    "Single-Leg Hip Thrust",
    "Single-Leg Calf Raise",
    "Weighted L-Sit Hold"
  ]
};





document.addEventListener('DOMContentLoaded', () => {
  let dialogOpener = null;
  let cardToReplace = null;

  // === element references ===
  const chooser            = document.getElementById('chooser');
  const selector           = document.getElementById('WorkoutSelection');
  const workoutsContainer  = document.getElementById('workouts');
  const sections           = document.querySelectorAll('.workout-section');
  const submitBtnWrapper   = document.getElementById('submitButton');
  const backBtn            = document.getElementById('back');

  const dataButton         = document.getElementById('dataButton');
  const dataSection        = document.getElementById('dataSection');
  const dataBack           = document.getElementById('dataBack');
  const exerciseDropdown   = document.getElementById('exerciseDropdown');

  const infoDialog         = document.getElementById('infoDialog');
  const infoText           = document.getElementById('infoText');
  const infoCloseButton    = document.getElementById('infoCloseButton');

  infoCloseButton.addEventListener('click', () => {
      infoDialog.close();
  });

  fetch('https://gym-backend-m64q.onrender.com/latest_workouts.json')
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector('#latestWorkoutsTable tbody');
    tbody.innerHTML = '';
    data.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.date}</td><td>${row.notes}</td>`;
      tbody.appendChild(tr);
    });
  });

  function loadWorkout(workoutName) {
  const container = document.getElementById('workoutContainer');
  container.innerHTML = ''; // clear previous

  workoutsData[workoutName].forEach(name => {
    const card = makeExerciseCard(name);
    autofillCardPreviousSets(card, name);
    container.appendChild(card);
  });

  const addCardDiv = document.createElement('div');
  addCardDiv.className = 'exercise-card';
  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'add-card';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', () => {
    dialogOpener = addBtn;
    dialog.showModal();
  });
  addCardDiv.appendChild(addBtn);
  container.appendChild(addCardDiv);

  container.style.display = 'block';
}

selector.addEventListener('change', () => {
  const val = selector.value;
  if (!val) {
    workoutsContainer.style.display = 'none';
    submitBtnWrapper.style.display = 'none';
    chooser.style.display = 'block';
    return;
  }

  chooser.style.display = 'none';
  workoutsContainer.style.display = 'block';
  submitBtnWrapper.style.display = 'block';
  // Hide other workout sections if needed:
  sections.forEach(s => s.style.display = 'none');

  loadWorkout(val); // this actually creates exercise cards!
});


  // === back button ===
  backBtn.addEventListener('click', () => {
    workoutsContainer.style.display = 'none';
    submitBtnWrapper.style.display  = 'none';
    chooser.style.display           = 'block';
    selector.value                  = '';
  });

  // === data view ===
  dataButton.addEventListener('click', () => {
    chooser.style.display           = 'none';
    workoutsContainer.style.display = 'none';
    submitBtnWrapper.style.display  = 'none';
    dataSection.style.display       = 'block';
    fetch('https://gym-backend-m64q.onrender.com/exercises.json')
      .then(res => res.json())
      .then(exs => {
        exerciseDropdown.innerHTML = '<option value="">--Select Exercise--</option>';
        exs.forEach(e => {
          const opt = document.createElement('option');
          opt.value       = e.id;
          opt.textContent = `${e.name} (${e.muscle_group})`;
          exerciseDropdown.appendChild(opt);
        });
      });
  });
  dataBack.addEventListener('click', () => {
    dataSection.style.display = 'none';
    chooser.style.display     = 'block';
  });

  // === helper to create a new set-row ===
  function makeSetRow() {
    const row = document.createElement('div');
    row.classList.add('set-row');
    ['reps', 'kg'].forEach(ph => {
      const wrap  = document.createElement('div');
      const input = document.createElement('input');
      input.type        = 'number';
      input.placeholder = ph;
      wrap.appendChild(input);
      row.appendChild(wrap);
    });
    const btn = document.createElement('button');
    btn.type        = 'button';
    btn.textContent = '-';
    btn.classList.add('remove-set');
    btn.addEventListener('click', () => row.remove());
    row.appendChild(btn);
    return row;
  }

  // === helper to add reorder buttons to a card ===
  function addCardControls(card) {
    const hdrWrap = card.querySelector('.exercise-header-wrapper');

    // Up button
    const upBtn = document.createElement('button');
    upBtn.type = 'button';
    upBtn.classList.add('move-up');
    upBtn.innerHTML = '<i class="fas fa-arrow-up"></i>';
    upBtn.addEventListener('click', () => {
      const prev = card.previousElementSibling;
      if (prev && prev.classList.contains('exercise-card')) {
        card.parentNode.insertBefore(card, prev);
      }
    });

    // Down button
    const downBtn = document.createElement('button');
    downBtn.type = 'button';
    downBtn.classList.add('move-down');
    downBtn.innerHTML = '<i class="fas fa-arrow-down"></i>';
    downBtn.addEventListener('click', () => {
      const next = card.nextElementSibling;
      if (next && next.classList.contains('exercise-card')) {
        card.parentNode.insertBefore(next, card);
      }
    });

    // Refresh (swap) button
    const refreshBtn = document.createElement('button');
    refreshBtn.type = 'button';
    refreshBtn.classList.add('refresh-card');
    refreshBtn.innerHTML = '<i class="fas fa-sync"></i>';
    refreshBtn.addEventListener('click', () => {
      cardToReplace = card;
      input.value = '';
      dialog.showModal();
    });

    hdrWrap.append(upBtn, downBtn, refreshBtn);
  }


  document.querySelectorAll('.exercise-card').forEach(card => {
    // only if it actually has a header (to skip the “+” card at the end)
    if (card.querySelector('.exercise-header')) {
      addCardControls(card);
    }
  });

  // === wire up existing add-set buttons ===
  document.querySelectorAll('.exercise-card').forEach(card => {
    const addSetBtn = card.querySelector('.add-set');
    if (!addSetBtn) return;
    addSetBtn.addEventListener('click', () => {
      const newRow = makeSetRow();
      addSetBtn.before(newRow);
    });
  });

  // === wire up any existing remove-set buttons in the initial markup ===
  document.querySelectorAll('.set-row .remove-set').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.set-row').remove());
  });

  const API_BASE = 'https://gym-backend-m64q.onrender.com';
  let allExercises = [];

  fetch(`${API_BASE}/exercises.json`)
    .then(res => res.json())
    .then(exs => {
      allExercises = exs; 
      const dl = document.getElementById('exerciseList');
      dl.innerHTML = exs
        .map(e => `<option value="${e.name}">`)
        .join('');
      autofillAllPreviousSets();
    });

  const dialog      = document.getElementById('exerciseDialog');
  const input       = document.getElementById('exerciseInput');
  const confirmBtn  = document.getElementById('exerciseConfirm');

  // === wire up the “+” that adds a whole new exercise card ===
  document.querySelectorAll('.exercise-card .add-card').forEach(btn => {
    btn.addEventListener('click', () => {
      input.value = '';         // clear previous
      dialogOpener = btn;       // track which "+" was clicked
      dialog.showModal();       // open the modal
    });
  });

  function autofillAllPreviousSets() {
  document.querySelectorAll('.exercise-card').forEach(card => {
    const hdr = card.querySelector('.exercise-header');
    if (!hdr) return;

    const name  = hdr.textContent.trim();
    const match = allExercises.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (!match) return;

    fetch(`${API_BASE}/latest_sets.json?exercise_id=${match.id}`)
      .then(res => res.json())
      .then(sets => {
        const rows   = card.querySelectorAll('.set-row');
        // grab the newest N, then reverse so row[0]=3rd-newest, [1]=2nd-newest, [2]=newest
        const recent = sets.slice(0, rows.length);
        const ordered = recent.reverse();

        ordered.forEach((s, i) => {
          const row = rows[i];
          if (!row) return;
          const [repInput, kgInput] = row.querySelectorAll('input');
          repInput.placeholder = s.reps;
          kgInput.placeholder  = s.weight;
        });
      });
  });
}

function autofillCardPreviousSets(card, exerciseName) {
  const match = allExercises.find(e => e.name.toLowerCase() === exerciseName.toLowerCase());
  if (!match) return;

  fetch(`${API_BASE}/latest_sets.json?exercise_id=${match.id}`)
    .then(res => res.json())
    .then(sets => {
      const rows   = card.querySelectorAll('.set-row');
      const recent = sets.slice(0, rows.length);
      const ordered = recent.reverse();

      ordered.forEach((s, i) => {
        const row = rows[i];
        if (!row) return;
        const [repInput, kgInput] = row.querySelectorAll('input');
        repInput.placeholder = s.reps;
        kgInput.placeholder  = s.weight;
      });
    });
}



// — when user confirms in the dialog —
  confirmBtn.addEventListener('click', () => {
  const name = input.value.trim();
  if (!name) return;

  const newCard = makeExerciseCard(name);
  autofillCardPreviousSets(newCard, name);

  if (cardToReplace) {
    cardToReplace.parentNode.replaceChild(newCard, cardToReplace);
    cardToReplace = null;
  } else if (dialogOpener) {
    const section = dialogOpener.closest('.workout-section');
    const addCardDiv = section.querySelector('.exercise-card:last-of-type');
    section.insertBefore(newCard, addCardDiv);
  }

  dialog.close();
});



  // === helper to create a whole new exercise card ===
function makeExerciseCard(name) {
  const card = document.createElement('div');
  card.classList.add('exercise-card');

  // — Header wrapper with title + trash icon button —
  const hdrWrap = document.createElement('div');
  hdrWrap.classList.add('exercise-header-wrapper');

  const hdr = document.createElement('div');
  hdr.classList.add('exercise-header');
  hdr.textContent = name;

  const infoData = { // Your info data
      "Squat": "Onder 11",
      "Bench Press": "Boven 5",
      "Close-Grip Bench Press": "Boven 5"
  };
  hdrWrap.append(hdr);

  if (infoData[name]) { // Check if infoData has an entry for this exercise
      const infoBtn = document.createElement('button'); // Create a button element
      infoBtn.type = 'button'; // Make it a button
      infoBtn.classList.add('info-card'); // Apply the info-card class for styling

      const infoIcon = document.createElement('i'); // Create the Font Awesome icon
      infoIcon.classList.add('fas', 'fa-info-circle');

      infoBtn.appendChild(infoIcon); // Put the icon inside the button

      // Add the click event listener to the button
      infoBtn.addEventListener('click', () => {
          infoText.textContent = infoData[name]; // Set the dialog text
          infoDialog.showModal(); // Show the dialog
      });

      hdrWrap.appendChild(infoBtn); // Append the button (containing the icon) to the header wrapper
  }


  card.appendChild(hdrWrap);

  // add the up/down controls
  addCardControls(card);

  const remBtn = document.createElement('button');
  remBtn.type = 'button';
  remBtn.classList.add('remove-card');
  remBtn.innerHTML = '<i class="fas fa-trash"></i>';      // same icon as your HTML
  remBtn.addEventListener('click', () => card.remove());
  hdrWrap.appendChild(remBtn);

  // — Three initial set‐rows —
  for (let i = 0; i < 3; i++) {
    card.appendChild(makeSetRow());
  }

  // — “+” add‐set button at bottom, same style as static cards —
  const addSetBtn = document.createElement('button');
  addSetBtn.type = 'button';
  addSetBtn.classList.add('add-set');
  addSetBtn.textContent = '+';                            // same text as your HTML
  addSetBtn.addEventListener('click', () => {
    const newRow = makeSetRow();
    card.insertBefore(newRow, addSetBtn);
  });
  card.appendChild(addSetBtn);

  return card;
}


  // === wire up any existing remove-card buttons ===
  document.querySelectorAll('.exercise-card .remove-card').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.exercise-card').remove());
  });

  // === submit workout ===
  const submitWorkoutBtn = document.getElementById('submitWorkout');
  submitWorkoutBtn.type = 'button';
  submitWorkoutBtn.addEventListener('click', () => {
    const workoutId   = selector.value;
    const workoutName = selector.options[selector.selectedIndex].text.trim();
    if (!workoutId) {
      alert('Please select a workout first.');
      return;
    }

    const section = document.getElementById('workoutContainer');
    const cards   = section.querySelectorAll('.exercise-card');
    const exercises = [];

    cards.forEach(card => {
      const hdr = card.querySelector('.exercise-header');
      if (!hdr) return;
      const sets = [];
      card.querySelectorAll('.set-row').forEach(row => {
        const [rInput, wInput] = row.querySelectorAll('input');
        const reps   = parseInt(rInput.value, 10);
        const weight = parseFloat(wInput.value);
        if (!isNaN(reps) && !isNaN(weight)) {
          sets.push({ reps, weight });
        }
      });
      exercises.push({ name: hdr.textContent.trim(), sets });
    });

    const payload = {
      workout: workoutName,
      date:    new Date().toISOString().slice(0,10),
      exercises
    };

    const summary = exercises
      .map(e => `${e.name}: ` + e.sets.map(s => `${s.reps}×${s.weight}kg`).join(', '))
      .join('\n');

    if (!confirm(`Submit this workout?\n\n${summary}`)) return;

    fetch(`${API_BASE}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        alert('Workout submitted successfully!');
        cards.forEach(c => c.querySelectorAll('input').forEach(i => i.value = ''));
        selector.value                   = '';
        workoutsContainer.style.display  = 'none';
        submitBtnWrapper.style.display   = 'none';
        chooser.style.display            = 'block';
      } else {
        alert('Error: ' + data.error);
      }
    })
    .catch(() => alert('Submission failed.'));
  });
});
</script>




</body>
</html>
